    <script>
      try {
        const origFetch = window.fetch;
        Object.defineProperty(window, 'fetch', {
          get: () => origFetch,
          set: () => { /* ignore overwrite */ },
          configurable: true
        });
      } catch (e) {
        console.warn('Could not redefine window.fetch', e);
      }
    </script>
